function generatePeaks(buffer) {
  const data = buffer.getChannelData(0);
  const pps = 100; 
  const step = Math.floor(buffer.sampleRate / pps);
  const peaks = new Float32Array(Math.floor(data.length / step) * 2);
  let idx = 0;
  for (let i = 0; i < data.length; i += step) {
    let min = 1.0, max = -1.0;
    for (let j = 0; j < step && i + j < data.length; j++) {
      const datum = data[i + j];
      if (datum < min) min = datum;
      if (datum > max) max = datum;
    }
    peaks[idx++] = min; peaks[idx++] = max;
  }
  return { data: peaks, pps: pps };
}

window.PluginRegistry = {};
const PLUGINS = ['NONE'];

window.registerPlugin = function(name, definition) {
  if (!PLUGINS.includes(name)) PLUGINS.push(name);
  window.PluginRegistry[name] = definition;
  lastRegisteredPlugin = name;
  needsRender = true;
};

pluginInput.onchange = async (e) => {

  try {

      if (vstTarget.isMaster) {
        masterPlugins[vstTarget.slotIdx] = lastRegisteredPlugin;
        masterPluginParams[vstTarget.slotIdx] = initPluginParams(lastRegisteredPlugin);
      } else {
        const track = tracks.find(t => t.id === vstTarget.trackId);
        if (track) { track.plugins[vstTarget.slotIdx] = lastRegisteredPlugin; track.pluginParams[vstTarget.slotIdx] = initPluginParams(lastRegisteredPlugin); }

};

function initPluginParams(name) {
  const params = {};
  if (window.PluginRegistry[name] && window.PluginRegistry[name].params) window.PluginRegistry[name].params.forEach(p => { params[p.id] = p.def; });
  return params;
}

function createPluginNode(type, context, params) {
  if (!context || type === 'NONE' || !window.PluginRegistry[type]) return null;
  try { const node = window.PluginRegistry[type].create(context, params); if (node) node._pluginType = type; return node; } 
  catch(e) { console.error("Failed to compile plugin logic: ", e); return null; }
}

function generateUUID() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

function generateReverbIR(duration = 2.5, decay = 2.0, context = audioCtx) {
  const sampleRate = context.sampleRate, length = sampleRate * duration, impulse = context.createBuffer(2, length, sampleRate);
  for (let i = 0; i < 2; i++) { const channel = impulse.getChannelData(i); for (let j = 0; j < length; j++) channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, decay); }
  return impulse;
}

// PITCH PRESERVING GRANULAR ALGORITHM (OVERLAP-ADD)
const granularCode = `
  class GranularProcessor extends AudioWorkletProcessor {
      constructor() {
          super();
          this.buffer = null;
          this.grainSize = 2048; // Tighter 42ms grains for smooth stretching
          this.macroPtr = 0;
          this.delayFrames = 0;
          this.grains = [
              { active: false, ptr: 0, anchor: 0 },
              { active: false, ptr: 0, anchor: 0 }
          ];
          this.spawnTimer = 0;
          this.spawnInterval = this.grainSize / 2;

          this.port.onmessage = e => { 
              if(e.data.audioData) this.buffer = e.data.audioData; 
              if(e.data.startOffset !== undefined) {
                  this.macroPtr = e.data.startOffset;
                  this.grains.forEach(g => g.active = false);
                  this.spawnTimer = 0;
              }
              if(e.data.delayFrames !== undefined) {
                  this.delayFrames = e.data.delayFrames;
              }
          };
      }
      static get parameterDescriptors() { return [{ name: 'rate', defaultValue: 1.0 }]; }
      process(inputs, outputs, parameters) {
          const outL = outputs[0][0];
          const outR = outputs[0].length > 1 ? outputs[0][1] : null;
          
          if(!this.buffer) return true;

          const rateArray = parameters.rate;
          const isRateAudioRate = rateArray.length > 1;

          for(let i=0; i<outL.length; i++) {
              // Frame-accurate pause to sync with sequence timeline
              if (this.delayFrames > 0) {
                  this.delayFrames--;
                  outL[i] = 0;
                  if(outR) outR[i] = 0;
                  continue;
              }

              const rate = isRateAudioRate ? rateArray[i] : rateArray[0];

              if (this.spawnTimer <= 0) {
                  let g = this.grains.find(g => !g.active);
                  if (g) {
                      g.active = true;
                      g.ptr = 0;
                      g.anchor = this.macroPtr;
                  }
                  this.spawnTimer = this.spawnInterval;
              }
              this.spawnTimer--;

              let val = 0;
              for (let j=0; j<this.grains.length; j++) {
                  let g = this.grains[j];
                  if (g.active) {
                      let readPos = Math.floor(g.anchor + g.ptr);
                      let sample = this.buffer[readPos] || 0;
                      let env = 0.5 * (1 - Math.cos(2 * Math.PI * (g.ptr / this.grainSize))); // Hann Window
                      val += sample * env;
                      g.ptr += 1.0; // Play grain at 1.0x native pitch
                      if (g.ptr >= this.grainSize) g.active = false;
                  }
              }

              outL[i] = val;
              if (outR) outR[i] = val;
              
              // Advance macro pointer by stretch rate to compress/expand time
              this.macroPtr += rate;
          }
          return true;
      }
  }
  registerProcessor('gran', GranularProcessor);
`;

function initAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const blob = new Blob([granularCode], { type: 'application/javascript' });
    audioCtx.audioWorklet.addModule(URL.createObjectURL(blob)).then(() => {
        workletLoaded = true;
    }).catch(e => console.error("Worklet load failed:", e));

    globalReverbIR = generateReverbIR(3.0, 3.5); 
    
    masterBusNode = audioCtx.createGain(); masterGainNode = audioCtx.createGain(); masterGainNode.gain.value = masterVolume;
    masterSlotIns = [audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain()];
    masterSlotOuts = [audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain()];
    masterAnalyserNode = audioCtx.createAnalyser(); masterAnalyserNode.fftSize = 256; masterDataArray = new Uint8Array(masterAnalyserNode.frequencyBinCount);

    masterBusNode.connect(masterSlotIns[0]);
    for(let i=0; i<3; i++) masterSlotOuts[i].connect(masterSlotIns[i+1]);
    masterSlotOuts[3].connect(masterGainNode); masterGainNode.connect(masterAnalyserNode); masterAnalyserNode.connect(audioCtx.destination);

    tracks.forEach(track => {
      track.inputNode = audioCtx.createGain(); track.gainNode = audioCtx.createGain(); track.gainNode.gain.value = track.volume;
      track.reverbNode = audioCtx.createConvolver(); track.reverbNode.buffer = globalReverbIR;
      track.wetGainNode = audioCtx.createGain(); track.wetGainNode.gain.value = track.reverb; 
      track.slotIns = [audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain()];
      track.slotOuts = [audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain(), audioCtx.createGain()];

      track.inputNode.connect(track.slotIns[0]);
      for(let i=0; i<3; i++) track.slotOuts[i].connect(track.slotIns[i+1]);
      track.slotOuts[3].connect(track.gainNode);
      track.gainNode.connect(masterBusNode); track.gainNode.connect(track.reverbNode); track.reverbNode.connect(track.wetGainNode); track.wetGainNode.connect(masterBusNode);
    });

    applyRouting();
  }
  
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function applyRouting() {
  if (!audioCtx) return;
  tracks.forEach(track => {
    track.plugins.forEach((p, i) => {
      track.slotIns[i].disconnect();
      if (p === 'NONE') {
        track.slotIns[i].connect(track.slotOuts[i]); 
        if (track.pluginNodes[i]) { try{ track.pluginNodes[i].disconnect(); }catch(e){} } track.pluginNodes[i] = null;
      } else {
        if (!track.pluginNodes[i] || track.pluginNodes[i]._pluginType !== p) {
            if (track.pluginNodes[i]) { try{ track.pluginNodes[i].disconnect(); }catch(e){} }
            const newNode = createPluginNode(p, audioCtx, track.pluginParams[i]);
            if (newNode) { track.slotIns[i].connect(newNode); if (newNode.connect) newNode.connect(track.slotOuts[i]); } else { track.slotIns[i].connect(track.slotOuts[i]); }
            track.pluginNodes[i] = newNode;
        } else {
            if (window.PluginRegistry[p] && window.PluginRegistry[p].update) window.PluginRegistry[p].update(track.pluginNodes[i], track.pluginParams[i]);
            track.slotIns[i].connect(track.pluginNodes[i]); 
        }
      }
    });
  });

  masterPlugins.forEach((p, i) => {
    masterSlotIns[i].disconnect();
    if (p === 'NONE') {
      masterSlotIns[i].connect(masterSlotOuts[i]);
      if (masterPluginNodes[i]) { try{ masterPluginNodes[i].disconnect(); }catch(e){} } masterPluginNodes[i] = null;
    } else {
      if (!masterPluginNodes[i] || masterPluginNodes[i]._pluginType !== p) {
          if (masterPluginNodes[i]) { try{ masterPluginNodes[i].disconnect(); }catch(e){} }
          const newNode = createPluginNode(p, audioCtx, masterPluginParams[i]);
          if (newNode) { masterSlotIns[i].connect(newNode); if (newNode.connect) newNode.connect(masterSlotOuts[i]); } else { masterSlotIns[i].connect(masterSlotOuts[i]); }
          masterPluginNodes[i] = newNode;
      } else {
          if (window.PluginRegistry[p] && window.PluginRegistry[p].update) window.PluginRegistry[p].update(masterPluginNodes[i], masterPluginParams[i]);
          masterSlotIns[i].connect(masterPluginNodes[i]);
      }
    }
  });
}

function getSnappedTime(time) { if (!isSnapEnabled) return time; return Math.round(time / (60 / currentBPM)) * (60 / currentBPM); }

function audioBufferToWav(buffer) {
  const numOfChan = buffer.numberOfChannels, length = buffer.length * numOfChan * 2 + 44, bufferArray = new ArrayBuffer(length), view = new DataView(bufferArray);
  const channels = []; let offset = 0, pos = 0;
  function setUint16(data) { view.setUint16(pos, data, true); pos += 2; } function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
  setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
  setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
  for (let i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
  while (pos < length) { for (let i = 0; i < numOfChan; i++) { let sample = Math.max(-1, Math.min(1, channels[i][offset])); sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; view.setInt16(pos, sample, true); pos += 2; } offset++; }
  return new Blob([bufferArray], { type: "audio/wav" });
}

function blobToBase64(blob) { return new Promise((resolve) => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(blob); }); }
async function base64ToArrayBuffer(base64) { const res = await fetch(base64); return await res.arrayBuffer(); }

async function saveSession() {
  if (isSaving) return; isSaving = true; needsRender = true;
  const project = { bpm: currentBPM, latency: globalLatencyMs, masterVolume, masterPlugins, masterPluginParams, tracks: [] };
  for (const t of tracks) {
    const trackData = { id: t.id, color: t.color, armed: t.armed, volume: t.volume, reverb: t.reverb, plugins: t.plugins, pluginParams: t.pluginParams, clips: [] };
    for (const c of t.clips) {
      if (!c.buffer) continue;
      const wavBlob = audioBufferToWav(c.buffer);
      trackData.clips.push({ id: c.id, startTime: c.startTime, startOffset: c.startOffset || 0, trimDuration: c.trimDuration, playbackRate: c.playbackRate || 1.0, audioData: await blobToBase64(wavBlob) });
    }
    project.tracks.push(trackData);
  }
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(project)), a = document.createElement('a');
  a.setAttribute("href", dataStr); a.setAttribute("download", `project_${currentBPM}bpm.json`);
  document.body.appendChild(a); a.click(); document.body.removeChild(a); isSaving = false; needsRender = true;
}

sessionInput.onchange = async (e) => {
  const file = e.target.files[0]; if (!file) return;
  isLoading = true; needsRender = true; initAudioContext(); stopAudio();
  try {
    const project = JSON.parse(await file.text());
    currentBPM = project.bpm || 120; globalLatencyMs = project.latency || 150; masterVolume = project.masterVolume !== undefined ? project.masterVolume : 1.0;
    masterPlugins = project.masterPlugins || ['NONE', 'NONE', 'NONE', 'NONE']; masterPluginParams = project.masterPluginParams || [{}, {}, {}, {}];
    
    for (const pTrack of project.tracks) {
      const t = tracks.find(trk => trk.id === pTrack.id);
      if (t) {
        t.color = pTrack.color; t.armed = pTrack.armed; t.volume = pTrack.volume; t.reverb = pTrack.reverb; 
        t.plugins = pTrack.plugins || ['NONE', 'NONE', 'NONE', 'NONE']; t.pluginParams = pTrack.pluginParams || [{}, {}, {}, {}]; t.clips = [];
        for (const pClip of pTrack.clips) {
          const audioBuffer = await audioCtx.decodeAudioData(await base64ToArrayBuffer(pClip.audioData));
          const peaks = generatePeaks(audioBuffer);
          t.clips.push({ id: pClip.id, trackId: t.id, buffer: audioBuffer, peaks: peaks, startTime: pClip.startTime, startOffset: pClip.startOffset || 0, trimDuration: pClip.trimDuration, playbackRate: pClip.playbackRate || 1.0, sourceNode: null, envNode: null });
        }
      }
    }
    applyRouting();
  } catch (err) { alert("Error loading session file."); }
  e.target.value = ''; isLoading = false; needsRender = true;
};

async function exportMixdown() {
  if (isMixing) return; initAudioContext();
  let maxEndTime = 0;
  tracks.forEach(track => track.clips.forEach(clip => { if (clip.startTime + clip.trimDuration > maxEndTime) maxEndTime = clip.startTime + clip.trimDuration; }));
  if (maxEndTime === 0) return alert("Project is empty.");

  isMixing = true; needsRender = true;
  const offlineCtx = new OfflineAudioContext(2, audioCtx.sampleRate * (maxEndTime + 4.0), audioCtx.sampleRate);
  const offlineReverbIR = generateReverbIR(3.0, 3.5, offlineCtx);
  
  await offlineCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([granularCode], { type: 'application/javascript' })));

  const offMasterBus = offlineCtx.createGain(); const offMasterGain = offlineCtx.createGain(); offMasterGain.gain.value = masterVolume;
  const offMasterNodes = masterPlugins.map((p, i) => createPluginNode(p, offlineCtx, masterPluginParams[i]));
  let lastOffMaster = offMasterBus;
  offMasterNodes.forEach(pn => { if (pn) { lastOffMaster.connect(pn); lastOffMaster = pn; } });
  lastOffMaster.connect(offMasterGain); offMasterGain.connect(offlineCtx.destination);

  tracks.forEach(track => {
    const tGain = offlineCtx.createGain(); tGain.gain.value = track.volume;
    const tReverb = offlineCtx.createConvolver(); tReverb.buffer = offlineReverbIR;
    const tWet = offlineCtx.createGain(); tWet.gain.value = track.reverb;
    
    tGain.connect(offMasterBus); tGain.connect(tReverb); tReverb.connect(tWet); tWet.connect(offMasterBus);
    
    track.clips.forEach(clip => {
      if (!clip.buffer) return;
      
      const offNodes = track.plugins.map((p, i) => createPluginNode(p, offlineCtx, track.pluginParams[i]));
      let lastTrackNode = null;
      let firstTrackNode = null;

      if (globalStretchMode === 'GRAN' && clip.playbackRate !== 1.0) {
          const envNode = offlineCtx.createGain();
          envNode.gain.value = 0;
          envNode.gain.setValueAtTime(0, clip.startTime);
          envNode.gain.linearRampToValueAtTime(1, clip.startTime + 0.005); // Anti-pop fade in
          envNode.gain.setValueAtTime(1, clip.startTime + clip.trimDuration - 0.005);
          envNode.gain.linearRampToValueAtTime(0, clip.startTime + clip.trimDuration); // Anti-pop fade out

          const src = new AudioWorkletNode(offlineCtx, 'gran');
          src.port.postMessage({ 
              audioData: clip.buffer.getChannelData(0),
              startOffset: (clip.startOffset || 0) * offlineCtx.sampleRate,
              delayFrames: clip.startTime * offlineCtx.sampleRate
          });
          src.parameters.get('rate').value = clip.playbackRate || 1.0;
          
          src.connect(envNode);
          firstTrackNode = envNode;
      } else {
          const src = offlineCtx.createBufferSource(); 
          src.buffer = clip.buffer; 
          src.playbackRate.value = clip.playbackRate || 1.0;
          src.start(clip.startTime, clip.startOffset || 0, clip.trimDuration * (clip.playbackRate || 1.0));
          firstTrackNode = src;
      }

      lastTrackNode = firstTrackNode;
      offNodes.forEach(pn => { if(pn) { lastTrackNode.connect(pn); lastTrackNode = pn; } });
      lastTrackNode.connect(tGain);
    });
  });

  try {
    const renderedBuffer = await offlineCtx.startRendering();
    const url = URL.createObjectURL(audioBufferToWav(renderedBuffer)), a = document.createElement('a');
    a.href = url; a.download = `mixdown_${currentBPM}bpm.wav`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch (err) { alert("Mixdown failed."); }
  isMixing = false; needsRender = true;
}

fileInput.onchange = async (e) => {
  const file = e.target.files[0]; if (!file || !activeLoadTrackId) return;
  initAudioContext();
  const track = tracks.find(t => t.id === activeLoadTrackId);
  const audioBuffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
  const peaks = generatePeaks(audioBuffer);
  track.clips.push({ id: generateUUID(), trackId: track.id, buffer: audioBuffer, peaks: peaks, startTime: getSnappedTime(playheadTime), startOffset: 0, trimDuration: audioBuffer.duration, playbackRate: 1.0, sourceNode: null, envNode: null });
  e.target.value = ''; activeLoadTrackId = null; needsRender = true; 
};

function scheduleClips() {
  tracks.forEach(track => {
    track.clips.forEach(clip => {
      if(!clip.buffer) return;
      if (!clip.trimDuration) clip.trimDuration = clip.buffer.duration;
      clip.startOffset = clip.startOffset || 0; 
      clip.playbackRate = clip.playbackRate || 1.0;
      
      const timeUntilStartTimeline = Math.max(0, clip.startTime - playheadTime);
      const timeIntoClipTimeline = Math.max(0, playheadTime - clip.startTime);
      const timeIntoClipBuffer = timeIntoClipTimeline * clip.playbackRate;
      const readOffsetBuffer = clip.startOffset + timeIntoClipBuffer;

        const x = 20 + (i * stripWidth); drawPanelBacking(x, startY, stripWidth - 20, stripHeight);
        ctx.fillStyle = track.color; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.fillText(`CH ${track.id}`, x + (stripWidth-20)/2, startY + 20); ctx.fillStyle = '#888'; ctx.font = '10px monospace'; ctx.fillText(`FX RACK`, x + (stripWidth-20)/2, startY + 45);
        for(let j=0; j<4; j++) drawPluginSlot(`plug_${track.id}_${j}`, x + 10, startY + 60 + (j * 32), stripWidth - 40, 25, track.plugins[j]);
        drawVerticalFader(`mixvol_${track.id}`, x + (stripWidth-20)/2 - 10, startY + 200, 20, stripHeight - 240, track.volume, track.color, 'VOL');
    });

    const mX = 20 + (4 * stripWidth); drawPanelBacking(mX, startY, stripWidth - 20, stripHeight);
    ctx.fillStyle = '#cc3333'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.fillText(`MASTER BUS`, mX + (stripWidth-20)/2, startY + 20); ctx.fillStyle = '#888'; ctx.font = '10px monospace'; ctx.fillText(`GLOBAL FX`, mX + (stripWidth-20)/2, startY + 45);
    for(let j=0; j<4; j++) drawPluginSlot(`mplog_${j}`, mX + 10, startY + 60 + (j * 32), stripWidth - 40, 25, masterPlugins[j]);
    drawSquareButton('mixdown', mX + 10, startY + 200, stripWidth - 40, 30, isMixing ? "MIXING" : "BOUNCE", isMixing, "#ffb800"); drawVerticalFader(`master_vol`, mX + (stripWidth-20)/2 - 10, startY + 250, 20, stripHeight - 290, masterVolume, '#cc3333', 'MASTER');
  }

  if (activeVstModal) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,width,height); const mw = 400, mh = 300, mx = width/2 - mw/2, my = height/2 - mh/2; drawPanelBacking(mx, my, mw, mh); ctx.fillStyle = '#1a1c22';
    [ [mx+15, my+15], [mx+mw-15, my+15], [mx+15, my+mh-15], [mx+mw-15, my+mh-15] ].forEach(pos => { ctx.beginPath(); ctx.arc(pos[0], pos[1], 4, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center'; ctx.fillText(activeVstModal.pluginName, mx + mw/2, my + 30);
    drawSquareButton('vst_close', mx + mw - 40, my + 10, 30, 30, 'X', false, '#cc3333');
    const reg = window.PluginRegistry[activeVstModal.pluginName];
    if (reg && reg.params) { reg.params.forEach((param, idx) => { const sy = my + 80 + (idx * 50), val = activeVstModal.paramsRef[param.id], pct = (val - param.min) / (param.max - param.min); drawMacroFader(`vst_param_${param.id}`, mx + 50, sy, 300, 15, pct, '#ffb800', param.label); }); }
  }

  requestAnimationFrame(render);
}

function findClipById(id) { for (let t of tracks) { const clip = t.clips.find(c => c.id === id); if (clip) return { track: t, clip: clip }; } return null; }

window.addEventListener('mousedown', (e) => {
  window.mouseIsDown = true; mouseX = e.clientX; mouseY = e.clientY; needsRender = true; let clickedButton = false;

  if (activeVstModal) {
    for (const [id, box] of Object.entries(activeButtons)) {
      if (id.startsWith('vst_') && mouseX >= box.x && mouseX <= box.x + box.w && mouseY >= box.y && mouseY <= box.y + box.h) {
         if (id === 'vst_close') { activeVstModal = null; return; }
         if (id.startsWith('vst_param_')) { isDraggingSlider = id.replace('vst_param_', ''); activeSliderType = 'vst'; updateVstSlider(mouseX, box); return; }
      }
    }
    return;
  }

  for (const [id, box] of Object.entries(activeButtons)) {
    let checkX = mouseX, checkY = mouseY;
    if (box.isWorld && !isMixerView) { checkX = mouseX - LEFT_PANEL_W + viewOffsetX; checkY = mouseY - TOP_BAR_H; }
    if (checkX >= box.x && checkX <= box.x + box.w && checkY >= box.y && checkY <= box.y + box.h) {
      clickedButton = true;

      if (id === 'play') playAudio(); if (id === 'stop') stopAudio(); if (id === 'rec') recordAudio(); 
      if (id === 'mixdown') exportMixdown(); if (id === 'save_sesh') saveSession(); if (id === 'load_sesh') sessionInput.click();
      if (id === 'snap') isSnapEnabled = !isSnapEnabled; if (id === 'grid') isGridEnabled = !isGridEnabled;
      if (id === 'shift') { isShiftEnabled = !isShiftEnabled; return; } 
      if (id === 'stretch_mode') { globalStretchMode = globalStretchMode === 'TAPE' ? 'GRAN' : 'TAPE'; needsRender = true; return; }
      if (id === 'toggle_view') isMixerView = !isMixerView;
      if (id === 'loop') { isLoopEnabled = !isLoopEnabled; if (isLoopEnabled && playheadTime > loopEnd) playheadTime = loopStart; }
      if (id === 'bpm_down' || id === 'bpm_up') { const step = () => { currentBPM = id === 'bpm_down' ? Math.max(40, currentBPM - 1) : Math.min(300, currentBPM + 1); loopEnd = loopStart + (60 / currentBPM) * 4; needsRender = true; }; step(); bpmHoldTimeout = setTimeout(() => { bpmHoldInterval = setInterval(step, 50); }, 400); }
      if (id === 'lat_down') globalLatencyMs = Math.max(0, globalLatencyMs - 10); if (id === 'lat_up') globalLatencyMs = Math.min(1000, globalLatencyMs + 10);

      if (id === 'gutter') {
          isDraggingGutter = true;
          wasPlayingBeforeDrag = isPlaying;
          if (isPlaying) stopAudio();
          playheadTime = Math.max(0, getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel));
          return;
      }

      if (id.startsWith('plug_') || id.startsWith('mplog_')) {
          const isMaster = id.startsWith('mplog_'); const parts = id.split('_'); const interactionType = parts[parts.length - 1]; const tId = isMaster ? null : parseInt(parts[1]); const slotIdx = isMaster ? parseInt(parts[1]) : parseInt(parts[2]);
          const track = isMaster ? null : tracks.find(t => t.id === tId); const pName = isMaster ? masterPlugins[slotIdx] : track.plugins[slotIdx];
          if (interactionType === 'led') { if (pName !== 'NONE' && window.PluginRegistry[pName] && window.PluginRegistry[pName].params) { activeVstModal = { pluginName: pName, isMaster, trackId: tId, slotIdx, paramsRef: isMaster ? masterPluginParams[slotIdx] : track.pluginParams[slotIdx], nodeRef: isMaster ? masterPluginNodes[slotIdx] : track.pluginNodes[slotIdx] }; } } 
          else if (interactionType === 'load') { vstTarget = { isMaster, trackId: tId, slotIdx }; pluginInput.click(); } 
          else if (interactionType === 'cycle') { initAudioContext(); let currentPluginIdx = PLUGINS.indexOf(pName); const nextPlugin = PLUGINS[(currentPluginIdx + 1) % PLUGINS.length]; if (isMaster) { masterPlugins[slotIdx] = nextPlugin; masterPluginParams[slotIdx] = initPluginParams(nextPlugin); } else { track.plugins[slotIdx] = nextPlugin; track.pluginParams[slotIdx] = initPluginParams(nextPlugin); } applyRouting(); }
          return;
      }

      if (id.startsWith('color_')) { activeColorTrackId = parseInt(id.split('_')[1]); colorPicker.value = tracks.find(t => t.id === activeColorTrackId).color; colorPicker.click(); }
      if (id.startsWith('arm_')) { const tId = parseInt(id.split('_')[1]); tracks.forEach(t => t.armed = (t.id === tId) ? !t.armed : false); }
      if (id.startsWith('load_')) { activeLoadTrackId = parseInt(id.split('_')[1]); fileInput.click(); }
      if (id.startsWith('del_')) { const cId = id.split('_')[1]; const result = findClipById(cId); if (result) { result.track.clips = result.track.clips.filter(c => c.id !== cId); if (selectedClip && selectedClip.id === cId) selectedClip = null; } return; }
      
      if (id.startsWith('vol_')) { isDraggingSlider = parseInt(id.split('_')[1]); activeSliderType = 'vol'; updateSlider(mouseX, box); return; }
      if (id.startsWith('rev_')) { isDraggingSlider = parseInt(id.split('_')[1]); activeSliderType = 'rev'; updateSlider(mouseX, box); return; }
      if (id.startsWith('mixvol_')) { isDraggingSlider = parseInt(id.split('_')[1]); activeSliderType = 'mixvol'; updateVerticalSlider(mouseY, box, isDraggingSlider); return; }
      if (id === 'master_vol') { isDraggingSlider = 'master'; activeSliderType = 'mixvol'; updateVerticalSlider(mouseY, box, 'master'); return; }

      if (!isMixerView) {
        if (id === 'loop_start') { isDraggingLoopStart = true; return; }
        if (id === 'loop_end') { isDraggingLoopEnd = true; return; }
        if (id.startsWith('trimL_')) { const cId = id.split('_')[1]; isDraggingTrimStart = cId; const result = findClipById(cId); if (result) selectedClip = result.clip; return; }
        if (id.startsWith('trim_')) { 
            const cId = id.split('_')[1]; 
            const result = findClipById(cId); 
            if (result) selectedClip = result.clip; 
            if (isShiftEnabled) isDraggingStretch = cId;
            else isDraggingTrim = cId; 
            return; 
        }
        if (id.startsWith('move_')) { const cId = id.split('_')[1]; const result = findClipById(cId); if (result) { isDraggingClip = result.clip; selectedClip = result.clip; clipDragOffsetTime = ((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel) - result.clip.startTime; } return; }
        if (id === 'scrollbar_thumb') { isDraggingScrollbar = true; scrollDragOffsetX = mouseX - box.x; return; }
        if (id === 'scrollbar_track' && !activeButtons['scrollbar_thumb'] || (id === 'scrollbar_track' && (mouseX < activeButtons['scrollbar_thumb'].x || mouseX > activeButtons['scrollbar_thumb'].x + activeButtons['scrollbar_thumb'].w))) { const thumbW = Math.max(30, ((width - LEFT_PANEL_W) / (TOTAL_DURATION * zoomLevel)) * (width - LEFT_PANEL_W)); viewOffsetX = (Math.max(0, Math.min((width - LEFT_PANEL_W) - thumbW, mouseX - LEFT_PANEL_W - (thumbW / 2))) / ((width - LEFT_PANEL_W) - thumbW)) * ((TOTAL_DURATION * zoomLevel) - (width - LEFT_PANEL_W)); isDraggingScrollbar = true; scrollDragOffsetX = thumbW / 2; return; }
      }
    }
  }

  if (!clickedButton && !isMixerView && !activeVstModal && mouseX > LEFT_PANEL_W && mouseY > TOP_BAR_H && mouseY < height - SCROLLBAR_H) {
    selectedClip = null; playheadTime = Math.max(0, getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel));
    if (isPlaying) { stopAudio(); playAudio(); }
  }
});

function updateSlider(mx, box) {
  if (!isDraggingSlider) return;
  const track = tracks.find(t => t.id === isDraggingSlider); let pct = Math.max(0, Math.min(1, (mx - box.x) / box.w));
  if (activeSliderType === 'vol') { track.volume = pct * 2; if (track.gainNode) track.gainNode.gain.value = track.volume; }
  if (activeSliderType === 'rev') { track.reverb = pct; if (track.wetGainNode) track.wetGainNode.gain.value = track.reverb; }
  needsRender = true;
}

function updateVerticalSlider(my, box, trackId) {
  if (!isDraggingSlider) return;
  let pct = Math.max(0, Math.min(1, 1 - ((my - box.y) / box.h)));
  if (trackId === 'master') { masterVolume = pct * 2; if (masterGainNode) masterGainNode.gain.value = masterVolume; } else { const track = tracks.find(t => t.id === trackId); track.volume = pct * 2; if (track.gainNode) track.gainNode.gain.value = track.volume; }
  needsRender = true;
}

function updateVstSlider(mx, box) {
  if (!activeVstModal || !isDraggingSlider) return;
  const reg = window.PluginRegistry[activeVstModal.pluginName]; const paramDef = reg.params.find(p => p.id === isDraggingSlider);
  if (paramDef) { let pct = Math.max(0, Math.min(1, (mx - box.x) / box.w)); const realValue = paramDef.min + pct * (paramDef.max - paramDef.min); activeVstModal.paramsRef[paramDef.id] = realValue; if (activeVstModal.nodeRef) reg.update(activeVstModal.nodeRef, activeVstModal.paramsRef); }
  needsRender = true;
}

window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY; needsRender = true;
  
  if (activeVstModal && isDraggingSlider && activeSliderType === 'vst') { updateVstSlider(mouseX, activeButtons[`vst_param_${isDraggingSlider}`]); return; }
  if (isDraggingSlider && !activeVstModal) { if (activeSliderType === 'mixvol') updateVerticalSlider(mouseY, activeButtons[isDraggingSlider === 'master' ? 'master_vol' : `mixvol_${isDraggingSlider}`], isDraggingSlider); else updateSlider(mouseX, activeButtons[`${activeSliderType}_${isDraggingSlider}`]); }
  
  if (!isMixerView && !activeVstModal) {
    if (isDraggingLoopStart) loopStart = Math.max(0, Math.min(loopEnd - 0.1, getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel)));
    if (isDraggingLoopEnd) loopEnd = Math.max(loopStart + 0.1, getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel));
    
    if (isDraggingGutter) {
        playheadTime = Math.max(0, getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel));
    }

    if (isDraggingTrimStart !== null) { 
        const result = findClipById(isDraggingTrimStart); 
        if (result) { 
            const clip = result.clip; const newStartTime = getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel); const maxStartTime = clip.startTime + clip.trimDuration - 0.1; const minStartTime = clip.startTime - clip.startOffset; const validStartTime = Math.max(minStartTime, Math.min(maxStartTime, newStartTime));
            const timeDelta = validStartTime - clip.startTime;
            if (timeDelta !== 0) { clip.startTime += timeDelta; clip.startOffset += timeDelta; clip.trimDuration -= timeDelta; }
        } 
    }

    if (isDraggingTrim !== null) { 
        const result = findClipById(isDraggingTrim); 
        if (result) { 
            const clip = result.clip; 
            const newDuration = Math.max(clip.startTime + 0.1, getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel)) - clip.startTime; 
            const maxAllowedDuration = (clip.buffer.duration - (clip.startOffset || 0)) / (clip.playbackRate || 1.0);
            clip.trimDuration = Math.max(0.1, Math.min(maxAllowedDuration, newDuration)); 
        } 
    }

    if (isDraggingStretch !== null) {
        const result = findClipById(isDraggingStretch);
        if (result) {
            const clip = result.clip;
            const newDuration = Math.max(clip.startTime + 0.1, getSnappedTime((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel)) - clip.startTime;
            
            const currentPlaybackRate = clip.playbackRate || 1.0;
            const bufferAudioVisible = clip.trimDuration * currentPlaybackRate;
            
            let newRate = bufferAudioVisible / newDuration;
            newRate = Math.max(0.1, Math.min(10.0, newRate));
            
            clip.playbackRate = newRate;
            clip.trimDuration = bufferAudioVisible / newRate;
        }
    }

    if (isDraggingClip !== null) {
      const clip = isDraggingClip; clip.startTime = Math.max(0, getSnappedTime(((mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel) - clipDragOffsetTime));
      if (mouseY > TOP_BAR_H + TIMELINE_H) { const tIdx = Math.floor((mouseY - TOP_BAR_H - TIMELINE_H) / (TRACK_H + 10)); if (tIdx >= 0 && tIdx < tracks.length && clip.trackId !== tracks[tIdx].id) { const oldT = tracks.find(t => t.id === clip.trackId); if (oldT) { oldT.clips = oldT.clips.filter(c => c.id !== clip.id); clip.trackId = tracks[tIdx].id; tracks[tIdx].clips.push(clip); } } }
    }
    if (isDraggingScrollbar) { const tw = TOTAL_DURATION * zoomLevel, vw = width - LEFT_PANEL_W; viewOffsetX = (Math.max(0, Math.min(vw - Math.max(30, (vw / tw) * vw), mouseX - LEFT_PANEL_W - scrollDragOffsetX)) / (vw - Math.max(30, (vw / tw) * vw))) * (tw - vw); }
  }
});

window.addEventListener('mouseup', () => { 
  window.mouseIsDown = false; isDraggingSlider = null; activeSliderType = null; isDraggingScrollbar = false; isDraggingTrim = null; isDraggingTrimStart = null; isDraggingStretch = null; isDraggingClip = null; isDraggingLoopStart = false; isDraggingLoopEnd = false; 
  
  if (isDraggingGutter) {
      isDraggingGutter = false;
      if (wasPlayingBeforeDrag) playAudio();
  }
  
  needsRender = true; clearTimeout(bpmHoldTimeout); clearInterval(bpmHoldInterval); 
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault(); needsRender = true;
  if (!isMixerView && !activeVstModal && mouseX > LEFT_PANEL_W && mouseY > TOP_BAR_H) {
    if (e.ctrlKey || e.shiftKey) { const tMouse = (mouseX - LEFT_PANEL_W + viewOffsetX) / zoomLevel; zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel + (e.deltaY * -0.1))); viewOffsetX = (tMouse * zoomLevel) - (mouseX - LEFT_PANEL_W); }
    else viewOffsetX += Math.abs(e.deltaX) > 0 ? e.deltaX : e.deltaY;
    viewOffsetX = Math.min(Math.max(0, (TOTAL_DURATION * zoomLevel) - (width - LEFT_PANEL_W)), Math.max(0, viewOffsetX));
  }
}, { passive: false });

requestAnimationFrame(render);
</script>
