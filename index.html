<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-Track Canvas Engine - Latency Sync & Modern UI</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; 
    background-color: #050505;
  }
  canvas {
    display: block;
    touch-action: none; 
  }
</style>
</head>
<body>

<canvas id="app"></canvas>

<script>
/**
 * PURE CANVAS 4-TRACK ENGINE v8
 * Hardware UI Overhaul, Chunky Faders, Latency Compensation
 */

const canvas = document.getElementById('app');
const ctx = canvas.getContext('2d', { alpha: false }); 

let width, height;
const TOTAL_DURATION = 300; 
let audioCtx;
let isPlaying = false;
let isRecording = false;
let isMixing = false; 
let playheadTime = 0;
let lastDrawTime = 0;
let animationFrameId;
let currentBPM = 120;
let isSnapEnabled = true; 

// LATENCY COMPENSATION STATE (in milliseconds)
let globalLatencyMs = 150; 

let viewOffsetX = 0; 
let zoomLevel = 40; 
const MIN_ZOOM = 5;
const MAX_ZOOM = 300;

let mediaRecorder;
let audioChunks = [];
let audioStream;
let currentRecordStartTime = 0;
let analyserNode;
let liveDataArray;
let globalReverbIR = null; 

let selectedClip = null; 
let clipboardClip = null; 

const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = 'audio/*';
let activeLoadTrackId = null;

const colorPicker = document.createElement('input');
colorPicker.type = 'color';
let activeColorTrackId = null;

colorPicker.addEventListener('input', (e) => {
  if (activeColorTrackId) {
    const track = tracks.find(t => t.id === activeColorTrackId);
    if (track) track.color = e.target.value;
  }
});

const tracks = [
  { id: 1, color: '#00e5ff', clips: [], gainNode: null, reverbNode: null, wetGainNode: null, armed: false, volume: 1, reverb: 0, livePixels: [] },
  { id: 2, color: '#ff0055', clips: [], gainNode: null, reverbNode: null, wetGainNode: null, armed: false, volume: 1, reverb: 0, livePixels: [] },
  { id: 3, color: '#00ff66', clips: [], gainNode: null, reverbNode: null, wetGainNode: null, armed: false, volume: 1, reverb: 0, livePixels: [] },
  { id: 4, color: '#ffcc00', clips: [], gainNode: null, reverbNode: null, wetGainNode: null, armed: false, volume: 1, reverb: 0, livePixels: [] }
];

const TOP_BAR_H = 70;
const LEFT_PANEL_W = 200; // Expanded to fit massive faders
const TIMELINE_H = 40;
const TRACK_H = 140; // Expanded for hardware faders
const SCROLLBAR_H = 15;

let mouseX = 0;
let mouseY = 0;
let activeButtons = {}; 
let isDraggingSlider = null; 
let activeSliderType = null; 
let isDraggingScrollbar = false;
let scrollDragOffsetX = 0;
let isDraggingTrim = null; 
let isDraggingClip = null; 
let clipDragOffsetTime = 0; 

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

function generateUUID() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function generateReverbIR(duration = 2.5, decay = 2.0, context = audioCtx) {
  const sampleRate = context.sampleRate;
  const length = sampleRate * duration;
  const impulse = context.createBuffer(2, length, sampleRate);
  for (let i = 0; i < 2; i++) {
    const channel = impulse.getChannelData(i);
    for (let j = 0; j < length; j++) {
      channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, decay);
    }
  }
  return impulse;
}

function initAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    globalReverbIR = generateReverbIR(3.0, 3.5); 

    tracks.forEach(track => {
      track.gainNode = audioCtx.createGain();
      track.gainNode.gain.value = track.volume;
      track.gainNode.connect(audioCtx.destination);

      track.reverbNode = audioCtx.createConvolver();
      track.reverbNode.buffer = globalReverbIR;
      
      track.wetGainNode = audioCtx.createGain();
      track.wetGainNode.gain.value = track.reverb; 
      
      track.reverbNode.connect(track.wetGainNode);
      track.wetGainNode.connect(audioCtx.destination);
    });
  }
}

function getSnappedTime(time) {
  if (!isSnapEnabled) return time; 
  const secondsPerBeat = 60 / currentBPM;
  return Math.round(time / secondsPerBeat) * secondsPerBeat;
}

function audioBufferToWav(buffer) {
  const numOfChan = buffer.numberOfChannels;
  const length = buffer.length * numOfChan * 2 + 44;
  const bufferArray = new ArrayBuffer(length);
  const view = new DataView(bufferArray);
  const channels = [];
  let offset = 0;
  let pos = 0;

  function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
  function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

  setUint32(0x46464952); 
  setUint32(length - 8);
  setUint32(0x45564157); 
  setUint32(0x20746d66); 
  setUint32(16);         
  setUint16(1);          
  setUint16(numOfChan);
  setUint32(buffer.sampleRate);
  setUint32(buffer.sampleRate * 2 * numOfChan); 
  setUint16(numOfChan * 2); 
  setUint16(16);         
  setUint32(0x61746164); 
  setUint32(length - pos - 4);

  for (let i = 0; i < buffer.numberOfChannels; i++) {
    channels.push(buffer.getChannelData(i));
  }

  while (pos < length) {
    for (let i = 0; i < numOfChan; i++) {
      let sample = Math.max(-1, Math.min(1, channels[i][offset])); 
      sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; 
      view.setInt16(pos, sample, true);
      pos += 2;
    }
    offset++;
  }
  return new Blob([bufferArray], { type: "audio/wav" });
}

async function exportMixdown() {
  if (isMixing) return;
  initAudioContext();
  
  let maxEndTime = 0;
  tracks.forEach(track => {
    track.clips.forEach(clip => {
      const end = clip.startTime + clip.trimDuration;
      if (end > maxEndTime) maxEndTime = end;
    });
  });

  if (maxEndTime === 0) {
    alert("Project is empty. Nothing to mix down.");
    return;
  }

  const renderDuration = maxEndTime + 4.0; 
  const sampleRate = audioCtx.sampleRate;
  
  const offlineCtx = new OfflineAudioContext(2, sampleRate * renderDuration, sampleRate);
  const offlineReverbIR = generateReverbIR(3.0, 3.5, offlineCtx);

  isMixing = true;

  tracks.forEach(track => {
    const tGain = offlineCtx.createGain();
    tGain.gain.value = track.volume;
    tGain.connect(offlineCtx.destination);

    const tReverb = offlineCtx.createConvolver();
    tReverb.buffer = offlineReverbIR;
    
    const tWet = offlineCtx.createGain();
    tWet.gain.value = track.reverb;
    
    tReverb.connect(tWet);
    tWet.connect(offlineCtx.destination);

    track.clips.forEach(clip => {
      if (!clip.buffer) return;
      const src = offlineCtx.createBufferSource();
      src.buffer = clip.buffer;
      
      src.connect(tGain);
      src.connect(tReverb);
      
      src.start(clip.startTime, 0, clip.trimDuration);
    });
  });

  try {
    const renderedBuffer = await offlineCtx.startRendering();
    const wavBlob = audioBufferToWav(renderedBuffer);
    
    const url = URL.createObjectURL(wavBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mixdown_${currentBPM}bpm.wav`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    alert("Mixdown failed.");
  }

  isMixing = false;
}

window.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'c' || e.key === 'C') {
      if (selectedClip) clipboardClip = { ...selectedClip }; 
    }
    if (e.key === 'v' || e.key === 'V') {
      if (clipboardClip) {
        const track = tracks.find(t => t.id === clipboardClip.trackId);
        if (track) {
          const newClip = { 
            ...clipboardClip, 
            id: generateUUID(), 
            startTime: clipboardClip.startTime + clipboardClip.trimDuration 
          };
          track.clips.push(newClip);
          selectedClip = newClip; 
          clipboardClip = newClip; 
        }
      }
    }
  }
});

fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file || !activeLoadTrackId) return;
  initAudioContext();
  const arrayBuffer = await file.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  
  const track = tracks.find(t => t.id === activeLoadTrackId);
  
  const newClip = {
    id: generateUUID(),
    trackId: track.id,
    buffer: audioBuffer,
    startTime: getSnappedTime(playheadTime),
    trimDuration: audioBuffer.duration,
    sourceNode: null
  };
  
  track.clips.push(newClip);
  selectedClip = newClip;
  
  e.target.value = '';
  activeLoadTrackId = null;
};

function playAudio() {
  initAudioContext();
  if (isPlaying) return;
  isPlaying = true;
  lastDrawTime = audioCtx.currentTime;
  
  tracks.forEach(track => {
    track.clips.forEach(clip => {
      clip.sourceNode = audioCtx.createBufferSource();
      clip.sourceNode.buffer = clip.buffer;
      
      clip.sourceNode.connect(track.gainNode);
      clip.sourceNode.connect(track.reverbNode);

      const timeUntilStart = Math.max(0, clip.startTime - playheadTime);
      const bufferOffset = Math.max(0, playheadTime - clip.startTime);
      
      if (bufferOffset < clip.trimDuration) {
        clip.sourceNode.start(audioCtx.currentTime + timeUntilStart, bufferOffset, clip.trimDuration - bufferOffset);
      }
    });
  });
}

function stopAudio() {
  isPlaying = false;
  isRecording = false;
  
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
  tracks.forEach(track => {
    track.clips.forEach(clip => {
      if (clip.sourceNode) {
        try { clip.sourceNode.stop(); } catch(e) {}
        clip.sourceNode.disconnect();
        clip.sourceNode = null;
      }
    });
  });
}

async function recordAudio() {
  initAudioContext();
  const armedTrack = tracks.find(t => t.armed);
  if (!armedTrack) return alert('Arm a track first!');
  
  if (!audioStream) {
    audioStream = await navigator.mediaDevices.getUserMedia({ 
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 48000 } 
    });
  }
  
  const micSource = audioCtx.createMediaStreamSource(audioStream);
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 256;
  micSource.connect(analyserNode);
  liveDataArray = new Uint8Array(analyserNode.frequencyBinCount);

  mediaRecorder = new MediaRecorder(audioStream);
  audioChunks = [];
  
  currentRecordStartTime = getSnappedTime(playheadTime);
  armedTrack.livePixels = [];
  
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const arrayBuffer = await blob.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    
    // LATENCY COMPENSATION MATH: Offset the clip backwards by globalLatencyMs
    const latencyOffsetSeconds = globalLatencyMs / 1000;
    const compensatedStartTime = Math.max(0, currentRecordStartTime - latencyOffsetSeconds);

    const newClip = {
      id: generateUUID(),
      trackId: armedTrack.id,
      buffer: audioBuffer,
      startTime: compensatedStartTime,
      trimDuration: audioBuffer.duration,
      sourceNode: null
    };
    armedTrack.clips.push(newClip);
    selectedClip = newClip;
    armedTrack.livePixels = [];
  };

  isRecording = true;
  playAudio();
  mediaRecorder.start();
}

function drawRect(x, y, w, h, radius, fill) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, radius);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
}

// HARDWARE SQUARE RUBBER BUTTON
function drawSquareButton(id, x, y, w, h, text, isActive, colorStr) {
  activeButtons[id] = { x, y, w, h };
  const isHover = mouseX >= x && mouseX <= x + w && mouseY >= y && mouseY <= y + h;
  const isPressed = isHover && (window.mouseIsDown) || isActive;
  
  const baseColor = isActive ? colorStr : '#1e2126';
  
  ctx.save();
  if (isPressed && !isActive) ctx.translate(0, 2);

  // Beveled edge drawing
  drawRect(x, y, w, h, 4, baseColor);
  
  if (!isPressed && !isActive) {
    // 3D Top Highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
    drawRect(x, y, w, h/2, 4);
    // 3D Bottom Shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    drawRect(x, y + h/2, w, h/2, 4);
  } else {
    // Inset shadow for active/pressed
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    drawRect(x, y, w, h, 4);
  }
  
  // Border
  ctx.lineWidth = 1;
  ctx.strokeStyle = isPressed || isActive ? '#000' : '#333';
  ctx.strokeRect(x, y, w, h);
  
  ctx.fillStyle = isActive ? '#fff' : '#ccc';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w / 2, y + h / 2);
  ctx.restore();
}

// CHUNKY MACRO FADER
function drawMacroFader(id, x, y, w, h, value, color, label) {
  activeButtons[id] = { x, y: y - 10, w, h: h + 20 };
  
  // Fader Track Background (Chunky)
  ctx.fillStyle = '#0a0b0d';
  drawRect(x, y, w, h, 2, '#0a0b0d');
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#222';
  ctx.strokeRect(x, y, w, h);

  // Filled Color Track
  const fillW = value * w;
  ctx.fillStyle = color;
  ctx.shadowBlur = 8;
  ctx.shadowColor = color;
  drawRect(x, y, fillW, h, 2, color);
  ctx.shadowBlur = 0;

  // Solid Thumb Grabber
  const thumbX = x + fillW;
  ctx.fillStyle = '#ddd';
  drawRect(thumbX - 6, y - 4, 12, h + 8, 2, '#ddd');
  
  // Grip Lines
  ctx.fillStyle = '#333';
  ctx.fillRect(thumbX - 2, y + h/2 - 4, 1, 8);
  ctx.fillRect(thumbX + 1, y + h/2 - 4, 1, 8);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(label, x, y - 6);
}

function render() {
  const chassisGrad = ctx.createLinearGradient(0, 0, 0, height);
  chassisGrad.addColorStop(0, '#121418');
  chassisGrad.addColorStop(1, '#08090a');
  ctx.fillStyle = chassisGrad;
  ctx.fillRect(0, 0, width, height);
  activeButtons = {}; 

  if (isPlaying) {
    const now = audioCtx.currentTime;
    playheadTime += (now - lastDrawTime);
    lastDrawTime = now;
    if (playheadTime > TOTAL_DURATION) { stopAudio(); playheadTime = 0; }
    
    if (isRecording && analyserNode) {
      const armedTrack = tracks.find(t => t.armed);
      if (armedTrack) {
        analyserNode.getByteTimeDomainData(liveDataArray);
        let max = 0;
        for(let i=0; i<liveDataArray.length; i++) {
           const val = Math.abs(liveDataArray[i] - 128) / 128;
           if (val > max) max = val;
        }
        armedTrack.livePixels.push({ time: playheadTime, val: max });
      }
    }
  }

  // --- SCROLLABLE TIMELINE & WAVES ---
  ctx.save();
  ctx.beginPath();
  ctx.rect(LEFT_PANEL_W, TOP_BAR_H, width - LEFT_PANEL_W, height - TOP_BAR_H - SCROLLBAR_H);
  ctx.clip();
  ctx.translate(LEFT_PANEL_W - viewOffsetX, TOP_BAR_H);

  // Subtle Timeline background
  ctx.fillStyle = '#060708';
  ctx.fillRect(0, 0, TOTAL_DURATION * zoomLevel, TIMELINE_H);
  ctx.strokeStyle = '#1a1c20';
  ctx.beginPath(); ctx.moveTo(0, TIMELINE_H); ctx.lineTo(TOTAL_DURATION * zoomLevel, TIMELINE_H); ctx.stroke();

  const secondsPerBeat = 60 / currentBPM;
  let beatCount = 0;
  for(let t = 0; t <= TOTAL_DURATION; t += secondsPerBeat) {
    const px = t * zoomLevel;
    if (beatCount % 4 === 0) {
      ctx.fillStyle = '#444'; ctx.fillRect(px, TIMELINE_H - 12, 2, 12);
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fillRect(px, TIMELINE_H, 1, height);
    } else {
      ctx.fillStyle = '#222'; ctx.fillRect(px, TIMELINE_H - 6, 1, 6);
    }
    beatCount++;
  }

  tracks.forEach((track, i) => {
    const trackY = TIMELINE_H + (i * (TRACK_H + 10));
    ctx.fillStyle = '#0a0b0d';
    ctx.fillRect(0, trackY, TOTAL_DURATION * zoomLevel, TRACK_H);
    ctx.strokeStyle = '#15171a';
    ctx.strokeRect(0, trackY, TOTAL_DURATION * zoomLevel, TRACK_H);
    
    track.clips.forEach(clip => {
      const startPixel = clip.startTime * zoomLevel;
      const amp = TRACK_H / 2;
      const waveYCenter = trackY + amp;

      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = track.color; 
      ctx.fillStyle = track.color;

      const fullWaveWidthPixels = clip.buffer.duration * zoomLevel;
      const visibleWaveWidthPixels = clip.trimDuration * zoomLevel;
      
      const data = clip.buffer.getChannelData(0);
      const step = Math.max(1, Math.ceil(data.length / fullWaveWidthPixels));

      for (let x = 0; x < visibleWaveWidthPixels; x++) {
        let min = 1.0, max = -1.0;
        for (let j = 0; j < step; j++) {
          const datum = data[(x * step) + j];
          if (datum !== undefined) {
            if (datum < min) min = datum;
            if (datum > max) max = datum;
          }
        }
        const drawY = waveYCenter + (min * amp);
        const h = Math.max(1, (max - min) * amp);
        ctx.fillRect(startPixel + x, drawY, 1, h);
      }

      ctx.shadowBlur = 0; 
      
      if (selectedClip && selectedClip.id === clip.id) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(startPixel, trackY, visibleWaveWidthPixels, TRACK_H);
      }
      
      activeButtons[`del_${clip.id}`] = { x: startPixel, y: trackY, w: 20, h: 20, isWorld: true };
      ctx.fillStyle = '#cc0000';
      ctx.fillRect(startPixel, trackY, 20, 20);
      ctx.fillStyle = '#fff';
      ctx.font = '10px sans-serif';
      ctx.fillText('✕', startPixel + 10, trackY + 10);
      
      const dragHandleW = visibleWaveWidthPixels - 20;
      if (dragHandleW > 10) {
        const handleX = startPixel + 20;
        activeButtons[`move_${clip.id}`] = { x: handleX, y: trackY, w: dragHandleW, h: 20, isWorld: true };
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        if (isDraggingClip && isDraggingClip.id === clip.id) ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        else if (selectedClip && selectedClip.id === clip.id) ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        
        ctx.fillRect(handleX, trackY, dragHandleW, 20);
        
        ctx.fillStyle = '#aaa';
        ctx.font = '10px monospace';
        ctx.fillText('⣿⣿ DRAG', handleX + dragHandleW / 2, trackY + 10);
      }

      const trimHandleX = startPixel + visibleWaveWidthPixels - 10;
      activeButtons[`trim_${clip.id}`] = { x: trimHandleX, y: trackY, w: 14, h: TRACK_H, isWorld: true };
      
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      if (isDraggingTrim === clip.id) ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.fillRect(trimHandleX, trackY, 14, TRACK_H);
      
      ctx.fillStyle = '#fff';
      ctx.fillRect(trimHandleX + 4, trackY + TRACK_H/2 - 10, 2, 20); 
      ctx.fillRect(trimHandleX + 8, trackY + TRACK_H/2 - 10, 2, 20);

      ctx.restore();
    });

    if (track.livePixels.length > 0) {
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ff2a2a';
      ctx.fillStyle = '#ff2a2a';
      const amp = TRACK_H / 2;
      const waveYCenter = trackY + amp;
      track.livePixels.forEach(p => {
         const px = p.time * zoomLevel;
         const h = Math.max(2, p.val * TRACK_H);
         ctx.fillRect(px, waveYCenter - (h/2), 2, h);
      });
      ctx.restore();
    }
  });

  const playheadX = playheadTime * zoomLevel;
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#fff';
  ctx.fillRect(playheadX, 0, 2, height);
  ctx.shadowBlur = 0;
  ctx.restore(); 

  // --- LEFT PANEL (Hardware Zone) ---
  ctx.fillStyle = '#101216';
  ctx.fillRect(0, TOP_BAR_H, LEFT_PANEL_W, height - TOP_BAR_H);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(LEFT_PANEL_W, TOP_BAR_H); ctx.lineTo(LEFT_PANEL_W, height); ctx.stroke();

  tracks.forEach((track, i) => {
    const trackY = TOP_BAR_H + TIMELINE_H + (i * (TRACK_H + 10));
    
    // Panel inset backing
    ctx.fillStyle = '#0d0f12';
    drawRect(10, trackY + 5, LEFT_PANEL_W - 20, TRACK_H - 10, 6);
    
    ctx.fillStyle = '#888';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`CH ${track.id}`, 20, trackY + 25);

    const colorBoxX = LEFT_PANEL_W - 35;
    const colorBoxY = trackY + 15;
    drawRect(colorBoxX, colorBoxY, 15, 15, 3, track.color, '#333');
    activeButtons[`color_${track.id}`] = { x: colorBoxX, y: colorBoxY, w: 15, h: 15 };

    drawSquareButton(`arm_${track.id}`, 20, trackY + 35, 60, 25, "ARM", track.armed, "#ff0033");
    drawSquareButton(`load_${track.id}`, 90, trackY + 35, 60, 25, "LOAD", false, "");

    // Massive Hardware Faders
    drawMacroFader(`vol_${track.id}`, 20, trackY + 85, 140, 14, track.volume / 2, '#00ffff', 'LEVEL');
    drawMacroFader(`rev_${track.id}`, 20, trackY + 115, 140, 14, track.reverb, '#ff00ff', 'REVERB');
  });

  // --- CUSTOM SCROLLBAR ---
  const scrollbarTrackW = width - LEFT_PANEL_W;
  const scrollbarTrackY = height - SCROLLBAR_H;
  ctx.fillStyle = '#08090a';
  ctx.fillRect(LEFT_PANEL_W, scrollbarTrackY, scrollbarTrackW, SCROLLBAR_H);

  const totalWorldW = TOTAL_DURATION * zoomLevel;
  const visibleWorldW = width - LEFT_PANEL_W;
  
  if (totalWorldW > visibleWorldW) {
    const thumbW = Math.max(30, (visibleWorldW / totalWorldW) * scrollbarTrackW);
    const thumbX = LEFT_PANEL_W + (viewOffsetX / (totalWorldW - visibleWorldW)) * (scrollbarTrackW - thumbW);
    
    drawRect(thumbX, scrollbarTrackY + 2, thumbW, SCROLLBAR_H - 4, 5, isDraggingScrollbar ? '#555' : '#2a2d33');
    activeButtons['scrollbar_thumb'] = { x: thumbX, y: scrollbarTrackY, w: thumbW, h: SCROLLBAR_H };
    activeButtons['scrollbar_track'] = { x: LEFT_PANEL_W, y: scrollbarTrackY, w: scrollbarTrackW, h: SCROLLBAR_H };
  }

  // --- TOP BAR ---
  const topGrad = ctx.createLinearGradient(0, 0, 0, TOP_BAR_H);
  topGrad.addColorStop(0, '#1a1c22');
  topGrad.addColorStop(1, '#101216');
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, width, TOP_BAR_H);
  ctx.strokeStyle = '#000';
  ctx.beginPath(); ctx.moveTo(0, TOP_BAR_H); ctx.lineTo(width, TOP_BAR_H); ctx.stroke();

  drawSquareButton('play', 20, 15, 70, 40, "▶ PLAY", isPlaying, "#00ff66");
  drawSquareButton('stop', 100, 15, 70, 40, "■ STOP", false, "");
  drawSquareButton('rec', 180, 15, 80, 40, "● REC", isRecording, "#ff0033");
  
  // BPM Area
  drawSquareButton('bpm_down', 280, 15, 30, 40, "<", false, "");
  ctx.fillStyle = '#050505';
  drawRect(315, 15, 70, 40, 4);
  ctx.fillStyle = '#00e5ff';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${currentBPM} BPM`, 350, 35);
  drawSquareButton('bpm_up', 390, 15, 30, 40, ">", false, "");

  drawSquareButton('snap', 435, 15, 80, 40, isSnapEnabled ? "SNAP ON" : "SNAP OFF", isSnapEnabled, "#00aaff");

  // LATENCY COMPENSATION AREA
  drawSquareButton('lat_down', 530, 15, 30, 40, "<", false, "");
  ctx.fillStyle = '#050505';
  drawRect(565, 15, 80, 40, 4);
  ctx.fillStyle = '#ffcc00';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`LATENCY`, 605, 25);
  ctx.fillText(`${globalLatencyMs}ms`, 605, 40);
  drawSquareButton('lat_up', 650, 15, 30, 40, ">", false, "");

  drawSquareButton('mixdown', 700, 15, 90, 40, isMixing ? "MIXING..." : "MIXDOWN", isMixing, "#ff9900");

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(playheadTime.toFixed(2) + 's', width - 20, TOP_BAR_H / 2);

  requestAnimationFrame(render);
}

function findClipById(id) {
  for (let t of tracks) {
    const clip = t.clips.find(c => c.id === id);
    if (clip) return { track: t, clip: clip };
  }
  return null;
}

// --- INTERACTION PHYSICS ---

window.addEventListener('mousedown', (e) => {
  window.mouseIsDown = true;
  mouseX = e.clientX;
  mouseY = e.clientY;

  let clickedButton = false;

  for (const [id, box] of Object.entries(activeButtons)) {
    let checkX = mouseX;
    let checkY = mouseY;
    if (box.isWorld) {
      checkX = mouseX - LEFT_PANEL_W + viewOffsetX;
      checkY = mouseY - TOP_BAR_H;
    }

    if (checkX >= box.x && checkX <= box.x + box.w && checkY >= box.y && checkY <= box.y + box.h) {
      clickedButton = true;

      if (id === 'play') playAudio();
      if (id === 'stop') stopAudio();
      if (id === 'rec') recordAudio();
      if (id === 'mixdown') exportMixdown();
      if (id === 'snap') { isSnapEnabled = !isSnapEnabled; }
      
      if (id === 'bpm_down') { currentBPM = Math.max(40, currentBPM - 1); }
      if (id === 'bpm_up') { currentBPM = Math.min(300, currentBPM + 1); }
      
      // LATENCY CONTROLS
      if (id === 'lat_down') { globalLatencyMs = Math.max(0, globalLatencyMs - 10); }
      if (id === 'lat_up') { globalLatencyMs = Math.min(1000, globalLatencyMs + 10); }
      
      if (id.startsWith('color_')) {
        activeColorTrackId = parseInt(id.split('_')[1]);
        const t = tracks.find(t => t.id === activeColorTrackId);
        colorPicker.value = t.color; 
        colorPicker.click();
      }
      
      if (id.startsWith('trim_')) {
        const cId = id.split('_')[1];
        isDraggingTrim = cId;
        const result = findClipById(cId);
        if (result) selectedClip = result.clip;
        return;
      }
      
      if (id.startsWith('move_')) {
        const cId = id.split('_')[1];
        const result = findClipById(cId);
        if (result) {
          isDraggingClip = result.clip;
          selectedClip = result.clip; 
          const worldX = mouseX - LEFT_PANEL_W + viewOffsetX;
          clipDragOffsetTime = (worldX / zoomLevel) - result.clip.startTime;
        }
        return;
      }
      
      if (id.startsWith('arm_')) {
        const tId = parseInt(id.split('_')[1]);
        tracks.forEach(t => t.armed = (t.id === tId) ? !t.armed : false);
      }
      if (id.startsWith('load_')) {
        activeLoadTrackId = parseInt(id.split('_')[1]);
        fileInput.click();
      }
      if (id.startsWith('del_')) {
        const cId = id.split('_')[1];
        const result = findClipById(cId);
        if (result) {
           result.track.clips = result.track.clips.filter(c => c.id !== cId);
           if (selectedClip && selectedClip.id === cId) selectedClip = null;
        }
        return; 
      }
      if (id.startsWith('vol_')) {
        isDraggingSlider = parseInt(id.split('_')[1]);
        activeSliderType = 'vol';
        updateSlider(mouseX, box);
        return;
      }
      if (id.startsWith('rev_')) {
        isDraggingSlider = parseInt(id.split('_')[1]);
        activeSliderType = 'rev';
        updateSlider(mouseX, box);
        return;
      }
      if (id === 'scrollbar_thumb') {
        isDraggingScrollbar = true;
        scrollDragOffsetX = mouseX - box.x;
        return;
      }
      if (id === 'scrollbar_track' && !activeButtons['scrollbar_thumb'] || 
         (id === 'scrollbar_track' && (mouseX < activeButtons['scrollbar_thumb'].x || mouseX > activeButtons['scrollbar_thumb'].x + activeButtons['scrollbar_thumb'].w))) {
        
        const totalWorldW = TOTAL_DURATION * zoomLevel;
        const visibleWorldW = width - LEFT_PANEL_W;
        const scrollbarTrackW = width - LEFT_PANEL_W;
        const thumbW = Math.max(30, (visibleWorldW / totalWorldW) * scrollbarTrackW);
        
        let targetX = mouseX - LEFT_PANEL_W - (thumbW / 2);
        targetX = Math.max(0, Math.min(scrollbarTrackW - thumbW, targetX));
        
        viewOffsetX = (targetX / (scrollbarTrackW - thumbW)) * (totalWorldW - visibleWorldW);
        
        isDraggingScrollbar = true;
        scrollDragOffsetX = thumbW / 2;
        return;
      }
    }
  }

  if (!clickedButton && mouseX > LEFT_PANEL_W && mouseY > TOP_BAR_H && mouseY < height - SCROLLBAR_H) {
    selectedClip = null;
    const worldX = mouseX - LEFT_PANEL_W + viewOffsetX;
    const rawTime = worldX / zoomLevel;
    playheadTime = Math.max(0, getSnappedTime(rawTime));
    if (isPlaying) { stopAudio(); playAudio(); }
  }
});

function updateSlider(mx, box) {
  if (!isDraggingSlider) return;
  const track = tracks.find(t => t.id === isDraggingSlider);
  let pct = (mx - box.x) / box.w;
  pct = Math.max(0, Math.min(1, pct));
  
  if (activeSliderType === 'vol') {
    track.volume = pct * 2; 
    if (track.gainNode) track.gainNode.gain.value = track.volume;
  } else if (activeSliderType === 'rev') {
    track.reverb = pct; 
    if (track.wetGainNode) track.wetGainNode.gain.value = track.reverb;
  }
}

window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  
  if (isDraggingSlider) {
    const box = activeButtons[`${activeSliderType}_${isDraggingSlider}`];
    updateSlider(mouseX, box);
  }

  if (isDraggingTrim !== null) {
    const result = findClipById(isDraggingTrim);
    if (result) {
      const clip = result.clip;
      const worldX = mouseX - LEFT_PANEL_W + viewOffsetX;
      const rawTime = worldX / zoomLevel;
      
      const snappedEndTime = Math.max(clip.startTime + 0.1, getSnappedTime(rawTime));
      let newTrimDuration = snappedEndTime - clip.startTime;
      newTrimDuration = Math.max(0.1, Math.min(clip.buffer.duration, newTrimDuration));
      clip.trimDuration = newTrimDuration;
    }
  }

  if (isDraggingClip !== null) {
    const clip = isDraggingClip;
    const worldX = mouseX - LEFT_PANEL_W + viewOffsetX;
    const rawTime = (worldX / zoomLevel) - clipDragOffsetTime;
    clip.startTime = Math.max(0, getSnappedTime(rawTime));
  }
  
  if (isDraggingScrollbar) {
    const totalWorldW = TOTAL_DURATION * zoomLevel;
    const visibleWorldW = width - LEFT_PANEL_W;
    const scrollbarTrackW = width - LEFT_PANEL_W;
    const thumbW = Math.max(30, (visibleWorldW / totalWorldW) * scrollbarTrackW);
    
    let targetX = mouseX - LEFT_PANEL_W - scrollDragOffsetX;
    targetX = Math.max(0, Math.min(scrollbarTrackW - thumbW, targetX));
    
    viewOffsetX = (targetX / (scrollbarTrackW - thumbW)) * (totalWorldW - visibleWorldW);
  }
});

window.addEventListener('mouseup', () => {
  window.mouseIsDown = false;
  isDraggingSlider = null;
  activeSliderType = null;
  isDraggingScrollbar = false;
  isDraggingTrim = null;
  isDraggingClip = null; 
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault(); 
  if (mouseX > LEFT_PANEL_W && mouseY > TOP_BAR_H) {
    
    if (e.ctrlKey || e.shiftKey) {
      const mouseWorldX_before = mouseX - LEFT_PANEL_W + viewOffsetX;
      const timeAtMouse = mouseWorldX_before / zoomLevel;
      
      const zoomDelta = e.deltaY * -0.1;
      zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel + zoomDelta));
      
      const mouseWorldX_after = timeAtMouse * zoomLevel;
      viewOffsetX = mouseWorldX_after - (mouseX - LEFT_PANEL_W);
    } 
    else {
      viewOffsetX += Math.abs(e.deltaX) > 0 ? e.deltaX : e.deltaY;
    }

    viewOffsetX = Math.max(0, viewOffsetX);
    const maxScroll = Math.max(0, (TOTAL_DURATION * zoomLevel) - (width - LEFT_PANEL_W));
    viewOffsetX = Math.min(maxScroll, viewOffsetX);
  }
}, { passive: false });

requestAnimationFrame(render);
</script>
</body>
